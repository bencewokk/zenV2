<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/logo.ico" />
    <title>Zen</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Boot crash handler: a module-evaluation error (bad chunk order, failed
      // import) throws before React ever mounts, so the in-app ErrorBoundary
      // never renders — the user gets a silent black screen. This pre-module
      // script needs no dependencies: if an error fires while #root is still
      // empty, paint a minimal recovery screen with a reload.
      (function () {
        var shown = false;
        function bootCrash(detail) {
          var root = document.getElementById("root");
          if (shown || !root || root.childElementCount > 0) return; // app mounted — its own handlers take over
          shown = true;
          root.innerHTML =
            '<div role="alert" style="position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:24px;text-align:center;background:#101216;color:#e6e8ee;font-family:system-ui,sans-serif">' +
            '<div style="font-size:16px;font-weight:600">Zen failed to start</div>' +
            '<div style="font-size:13px;opacity:.7;max-width:400px">Something crashed while loading. Your notes are saved locally — reloading usually fixes it.</div>' +
            '<div style="font-size:11px;opacity:.45;max-width:440px;word-break:break-word;font-family:ui-monospace,monospace" id="boot-crash-detail"></div>' +
            '<button onclick="window.location.reload()" style="margin-top:4px;border-radius:8px;border:1px solid #6ea8fe;background:rgba(110,168,254,0.15);color:#e6e8ee;padding:8px 18px;font-size:13px;cursor:pointer">Reload Zen</button>' +
            "</div>";
          // textContent (not innerHTML) — the error message is untrusted text.
          document.getElementById("boot-crash-detail").textContent = detail || "";
        }
        window.addEventListener("error", function (e) {
          bootCrash(e.message || String(e.error || ""));
        });
        window.addEventListener("unhandledrejection", function (e) {
          var r = e.reason;
          bootCrash(r && r.message ? r.message : String(r));
        });
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
