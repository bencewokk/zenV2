name: CI

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  app-and-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            api/package-lock.json
      - run: npm ci
      - run: npm --prefix api ci
      - run: npm test
      - run: npm --prefix api test
      - run: npm run build
      - run: npm --prefix api run typecheck
      - run: npm audit --omit=dev --audit-level=high
      - run: npm --prefix api audit --omit=dev --audit-level=high

  rust:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
      - name: Install Tauri build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          shared-key: ci
          add-job-id-key: false
          cache-on-failure: true
      - run: cargo check --manifest-path src-tauri/Cargo.toml --locked
