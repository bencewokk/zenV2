name: Release

# Build native installers and publish them to a GitHub Release.
# Trigger by pushing a version tag, e.g.:  git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

# A newer release of the same tag/ref supersedes any still-running attempt.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    env:
      WINDOWS_CODE_SIGNING_ENABLED: ${{ secrets.WINDOWS_CERTIFICATE != '' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: "--bundles nsis"
          - platform: macos-latest
            args: "--target aarch64-apple-darwin --bundles app,dmg"
          - platform: ubuntu-22.04
            args: "--bundles appimage"

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v5
        with:
          # Full history + tags so scripts/version.mjs can resolve the release
          # version from `git describe --tags` (default checkout is shallow and
          # tagless, which would silently fall back to package.json's version).
          fetch-depth: 0

      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          # Tag-scoped caches cannot be reused by the next release tag. Use the
          # same stable key as windows-release-cache.yml, whose cache is saved
          # on the default branch and is therefore visible to tag workflows.
          shared-key: desktop-release
          add-job-id-key: false

      - name: Import Windows code-signing certificate
        if: matrix.platform == 'windows-latest' && env.WINDOWS_CODE_SIGNING_ENABLED == 'true'
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          $path = Join-Path $env:RUNNER_TEMP "zen-code-signing.pfx"
          [IO.File]::WriteAllBytes($path, [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE))
          $password = ConvertTo-SecureString $env:WINDOWS_CERTIFICATE_PASSWORD -AsPlainText -Force
          $cert = Import-PfxCertificate -FilePath $path -CertStoreLocation Cert:\CurrentUser\My -Password $password
          "ZEN_WINDOWS_CERT_THUMBPRINT=$($cert.Thumbprint)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Remove-Item -LiteralPath $path -Force

      - run: npm ci

      # tauri-action reads tauri.conf.json before it runs beforeBuildCommand, so
      # the release version must be written before the action starts.
      - name: Sync release version
        run: node scripts/sync-version.mjs
        env:
          ZEN_RELEASE_VERSION: ${{ github.ref_name }}

      - name: Configure Windows Authenticode signing
        if: matrix.platform == 'windows-latest' && env.ZEN_WINDOWS_CERT_THUMBPRINT != ''
        run: node scripts/configure-windows-signing.mjs

      - name: Build and publish
        uses: tauri-apps/tauri-action@v1
        env:
          # Private repos can keep using the default Actions token, or set
          # RELEASE_GITHUB_TOKEN as a GitHub variable/secret if needed.
          GITHUB_TOKEN: ${{ vars.RELEASE_GITHUB_TOKEN || secrets.RELEASE_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
          # Authoritative version for this build — the tag that triggered it.
          # scripts/version.mjs honours this over `git describe`, so the bundle,
          # frontend __APP_VERSION__, and updater all agree with the release tag.
          ZEN_RELEASE_VERSION: ${{ github.ref_name }}
          # Bundled Google client, baked into the released binaries at build time.
          # Add these in the repo: Settings → Secrets and variables → Actions.
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          ZEN_GOOGLE_CLIENT_ID: ${{ secrets.ZEN_GOOGLE_CLIENT_ID }}
          ZEN_GOOGLE_CLIENT_SECRET: ${{ secrets.ZEN_GOOGLE_CLIENT_SECRET }}
          # Auto-updater signing — produces signed artifacts + latest.json.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Native platform trust. These are separate from Tauri updater signatures.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Zen ${{ github.ref_name }}"
          releaseBody: "See the assets below to download and install Zen."
          # Keep private until every platform has uploaded and latest.json is complete.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  publish:
    name: Publish complete release
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ vars.RELEASE_GITHUB_TOKEN || secrets.RELEASE_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
        run: gh release edit "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" --draft=false
      - name: Verify production updater
        env:
          EXPECTED_VERSION: ${{ github.ref_name }}
        run: node scripts/smoke-production.mjs
