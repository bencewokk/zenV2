name: Release

# Build native installers and publish them to a GitHub Release.
# Trigger by pushing a version tag, e.g.:  git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: ""
          - platform: macos-latest
            target: "--target aarch64-apple-darwin"
          - platform: ubuntu-22.04
            target: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      - name: Build and publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Bundled Google client, baked into the released binaries at build time.
          # Add these in the repo: Settings → Secrets and variables → Actions.
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          ZEN_GOOGLE_CLIENT_ID: ${{ secrets.ZEN_GOOGLE_CLIENT_ID }}
          ZEN_GOOGLE_CLIENT_SECRET: ${{ secrets.ZEN_GOOGLE_CLIENT_SECRET }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Zen ${{ github.ref_name }}"
          releaseBody: "See the assets below to download and install Zen."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.target }}
